# ──────────────────────────────────────────────────────────────────────────────
# RustyCluster Client Configuration
# Place this file as:
#   - rustycluster.yaml         (project root)
#   - config/rustycluster.yaml  (config subfolder)
#   - ~/.rustycluster.yaml      (home directory)
#
# The client auto-discovers this file when you call get_client() with no args.
# ──────────────────────────────────────────────────────────────────────────────

rustycluster:

  # ── Connection ──────────────────────────────────────────────────────────────
  # Comma-separated host:port list. The first entry is the primary; if it
  # becomes unreachable the client fails over to the next entry in order.
  nodes: "localhost:50051,localhost:50052,localhost:50053"

  # ── Authentication ──────────────────────────────────────────────────────────
  username: testuser
  password: testpass

  # ── TLS (optional) ──────────────────────────────────────────────────────────
  use_tls: false
  # tls_ca_cert_path: /path/to/ca.crt
  # tls_client_cert_path: /path/to/client.crt
  # tls_client_key_path: /path/to/client.key

  # ── Timeouts & Retries ──────────────────────────────────────────────────────
  timeout_seconds: 10.0
  max_retries: 3
  retry_backoff_base: 0.5
  retry_backoff_max: 30.0

  # ── Connection Pool ─────────────────────────────────────────────────────────
  connection_pool_size: 5

  # ── Misc ────────────────────────────────────────────────────────────────────
  enable_compression: false
  log_level: WARNING
