syntax = "proto3";

package rustycluster;

service KeyValueService {
  // Authentication operations
  rpc Authenticate (AuthenticateRequest) returns (AuthenticateResponse);

  // System operations
  rpc Ping (PingRequest) returns (PingResponse);
  rpc HealthCheck (PingRequest) returns (PingResponse);

  // String operations
  rpc Set (SetRequest) returns (SetResponse);
  rpc Get (GetRequest) returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc SetEx (SetExRequest) returns (SetExResponse);
  rpc SetExpiry (SetExpiryRequest) returns (SetExpiryResponse);

  // Numeric operations
  rpc IncrBy (IncrByRequest) returns (IncrByResponse);
  rpc DecrBy (DecrByRequest) returns (DecrByResponse);
  rpc IncrByFloat (IncrByFloatRequest) returns (IncrByFloatResponse);

  // Hash operations
  rpc HSet (HSetRequest) returns (HSetResponse);
  rpc HGet (HGetRequest) returns (HGetResponse);
  rpc HGetAll (HGetAllRequest) returns (HGetAllResponse);
  rpc HIncrBy (HIncrByRequest) returns (HIncrByResponse);
  rpc HDecrBy (HDecrByRequest) returns (HDecrByResponse);
  rpc HIncrByFloat (HIncrByFloatRequest) returns (HIncrByFloatResponse);
  rpc HMSet (HMSetRequest) returns (HMSetResponse);
  rpc HExists (HExistsRequest) returns (HExistsResponse);
  rpc HDel (HDelRequest) returns (HDelResponse);
  rpc HScan (HScanRequest) returns (HScanResponse);
  rpc HLen (HLenRequest) returns (HLenResponse);
  rpc HSetNX (HSetNXRequest) returns (HSetNXResponse);
  rpc HExpire (HExpireRequest) returns (HExpireResponse);
  rpc HSetBytes (HSetBytesRequest) returns (HSetBytesResponse);
  rpc HGetBytes (HGetBytesRequest) returns (HGetBytesResponse);
  rpc HScanBytes (HScanBytesRequest) returns (HScanBytesResponse);
  rpc HGetAllBytes (HGetAllBytesRequest) returns (HGetAllBytesResponse);

  // Set operations
  rpc SAdd (SAddRequest) returns (SAddResponse);
  rpc SMembers (SMembersRequest) returns (SMembersResponse);
  rpc SRem (SRemRequest) returns (SRemResponse);
  rpc SCard (SCardRequest) returns (SCardResponse);
  rpc SScan (SScanRequest) returns (SScanResponse);

  // Sorted set operations
  rpc ZAdd (ZAddRequest) returns (ZAddResponse);
  rpc ZRem (ZRemRequest) returns (ZRemResponse);
  rpc ZRangeByScore (ZRangeByScoreRequest) returns (ZRangeByScoreResponse);
  rpc ZRange (ZRangeRequest) returns (ZRangeResponse);
  rpc ZScore (ZScoreRequest) returns (ZScoreResponse);
  rpc ZCard (ZCardRequest) returns (ZCardResponse);

  // Key operations
  rpc SetNX (SetNXRequest) returns (SetNXResponse);
  rpc Exists (ExistsRequest) returns (ExistsResponse);
  rpc DelMultiple (DelMultipleRequest) returns (DelMultipleResponse);
  rpc Keys (KeysRequest) returns (KeysResponse);
  rpc MGet (MGetRequest) returns (MGetResponse);

  // Script operations
  rpc LoadScript (LoadScriptRequest) returns (LoadScriptResponse);
  rpc EvalSha (EvalShaRequest) returns (EvalShaResponse);

  // List (queue) operations
  rpc LPush (LPushRequest) returns (LPushResponse);
  rpc RPush (RPushRequest) returns (RPushResponse);
  rpc LPop (LPopRequest) returns (LPopResponse);
  rpc RPop (RPopRequest) returns (RPopResponse);
  rpc LRange (LRangeRequest) returns (LRangeResponse);
  rpc LLen (LLenRequest) returns (LLenResponse);
  rpc LTrim (LTrimRequest) returns (LTrimResponse);
  rpc LIndex (LIndexRequest) returns (LIndexResponse);
  rpc LSet (LSetRequest) returns (LSetResponse);
  rpc LRem (LRemRequest) returns (LRemResponse);
  rpc LInsert (LInsertRequest) returns (LInsertResponse);
  rpc LPushX (LPushXRequest) returns (LPushXResponse);
  rpc RPushX (RPushXRequest) returns (RPushXResponse);
  rpc LPos (LPosRequest) returns (LPosResponse);
  rpc BLPop (BLPopRequest) returns (BLPopResponse);
  rpc BRPop (BRPopRequest) returns (BRPopResponse);

  // Stream operations
  rpc XAdd (XAddRequest) returns (XAddResponse);
  rpc XRead (XReadRequest) returns (XReadResponse);

  // Batch operations
  rpc BatchWrite (BatchWriteRequest) returns (BatchWriteResponse);
}

// Authentication operations
message AuthenticateRequest {
  string username = 1;
  string creds = 2;
}

message AuthenticateResponse {
  bool success = 1;
  string session_token = 2;
  string message = 3;
}

// String operations
message SetRequest {
  string key = 1;
  string value = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message SetResponse {
  bool success = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string value = 1;
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
  bool skip_replication = 2;
  bool skip_site_replication = 3;
}

message DeleteResponse {
  bool success = 1;
}

message SetExRequest {
  string key = 1;
  string value = 2;
  uint64 ttl = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message SetExResponse {
  bool success = 1;
}

message SetExpiryRequest {
  string key = 1;
  int64 ttl = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message SetExpiryResponse {
  bool success = 1;
}

// Numeric operations
message IncrByRequest {
  string key = 1;
  int64 value = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message IncrByResponse {
  int64 new_value = 1;
}

message DecrByRequest {
  string key = 1;
  int64 value = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message DecrByResponse {
  int64 new_value = 1;
}

message IncrByFloatRequest {
  string key = 1;
  double value = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message IncrByFloatResponse {
  double new_value = 1;
}

// Hash operations
message HSetRequest {
  string key = 1;
  string field = 2;
  string value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HSetResponse {
  bool success = 1;
}

message HGetRequest {
  string key = 1;
  string field = 2;
}

message HGetResponse {
  string value = 1;
  bool found = 2;
}

message HGetAllRequest {
  string key = 1;
}

message HGetAllResponse {
  map<string, string> fields = 1;
}

message HIncrByRequest {
  string key = 1;
  string field = 2;
  int64 value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HIncrByResponse {
  int64 new_value = 1;
}

message HDecrByRequest {
  string key = 1;
  string field = 2;
  int64 value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HDecrByResponse {
  int64 new_value = 1;
}

message HIncrByFloatRequest {
  string key = 1;
  string field = 2;
  double value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HIncrByFloatResponse {
  double new_value = 1;
}

// Hash multi-set operation
message HMSetRequest {
  string key = 1;
  map<string, string> fields = 2;  // field-value pairs
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message HMSetResponse {
  bool success = 1;
}

// Hash field exists operation
message HExistsRequest {
  string key = 1;
  string field = 2;
}

message HExistsResponse {
  bool exists = 1;
}

// Hash field delete operation
message HDelRequest {
  string key = 1;
  repeated string fields = 2;  // Fields to delete
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message HDelResponse {
  int32 deleted_count = 1;  // Number of fields that were deleted
}

// Hash scan operation
message HScanRequest {
  string key = 1;
  uint64 cursor = 2;  // Cursor for pagination (0 to start)
  optional string pattern = 3;  // Pattern to match field names
  optional uint32 count = 4;  // Hint for number of elements to return
}

message HScanResponse {
  uint64 next_cursor = 1;  // Next cursor (0 if scan is complete)
  map<string, string> fields = 2;  // Field-value pairs found
}

// Hash length operation
message HLenRequest {
  string key = 1;
}

message HLenResponse {
  int32 length = 1;  // Number of fields in the hash
}

// Hash set if not exists operation
message HSetNXRequest {
  string key = 1;
  string field = 2;
  string value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HSetNXResponse {
  bool success = 1;  // true if field was set, false if field already existed
}

// Hash expire operation (sets TTL on hash fields)
message HExpireRequest {
  string key = 1;
  int64 seconds = 2;
  repeated string fields = 3;  // Fields to set expiry on
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HExpireResponse {
  int32 expired_count = 1;  // Number of fields that had expiry set
}

// Hash set bytes operation (binary safe)
message HSetBytesRequest {
  bytes key = 1;
  bytes field = 2;
  bytes value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message HSetBytesResponse {
  bool success = 1;
}

// Hash get bytes operation (binary safe)
message HGetBytesRequest {
  bytes key = 1;
  bytes field = 2;
}

message HGetBytesResponse {
  bytes value = 1;
  bool found = 2;
}

// Hash scan bytes operation (binary safe)
message HScanBytesRequest {
  bytes key = 1;
  uint64 cursor = 2;
  optional bytes pattern = 3;
  optional uint32 count = 4;
}

message HScanBytesResponse {
  uint64 next_cursor = 1;
  repeated HScanBytesField fields = 2;  // Field-value pairs as bytes
}

message HScanBytesField {
  bytes field = 1;
  bytes value = 2;
}

// Hash get all bytes operation (binary safe)
message HGetAllBytesRequest {
  bytes key = 1;
}

message HGetAllBytesResponse {
  repeated HGetAllBytesField fields = 1;  // All field-value pairs as bytes
}

message HGetAllBytesField {
  bytes field = 1;
  bytes value = 2;
}

// Set if not exists operation
message SetNXRequest {
  string key = 1;
  string value = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message SetNXResponse {
  bool success = 1;  // true if key was set, false if key already existed
}

// Key exists operation
message ExistsRequest {
  string key = 1;
}

message ExistsResponse {
  bool exists = 1;
}

// Multiple key delete operation
message DelMultipleRequest {
  repeated string keys = 1;  // Keys to delete
  bool skip_replication = 2;
  bool skip_site_replication = 3;
}

message DelMultipleResponse {
  int32 deleted_count = 1;  // Number of keys that were deleted
}

// Keys pattern matching operation
message KeysRequest {
  string pattern = 1;  // Pattern to match keys (supports wildcards: *, ?, [])
}

message KeysResponse {
  repeated string keys = 1;  // All keys matching the pattern
}

// Multiple get operation
message MGetRequest {
  repeated string keys = 1;  // Keys to retrieve values for
}

message MGetResponse {
  repeated string values = 1;  // Values corresponding to keys (empty string if not found)
}

// Set add operation
message SAddRequest {
  string key = 1;
  repeated string members = 2;  // Members to add to the set
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message SAddResponse {
  int32 added_count = 1;  // Number of members that were added (not already in set)
}

// Set members operation
message SMembersRequest {
  string key = 1;
}

message SMembersResponse {
  repeated string members = 1;  // All members of the set
}

// Set remove operation
message SRemRequest {
  string key = 1;
  repeated string members = 2;  // Members to remove from the set
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message SRemResponse {
  int32 removed_count = 1;  // Number of members that were removed
}

// Set cardinality operation
message SCardRequest {
  string key = 1;
}

message SCardResponse {
  int32 cardinality = 1;  // Number of members in the set
}

// Set scan operation (cursor-based iteration for large sets)
message SScanRequest {
  string key = 1;
  uint64 cursor = 2;
  optional string pattern = 3;  // Glob-style pattern to filter members
  optional uint32 count = 4;  // Hint for approximate members per iteration
}

message SScanResponse {
  uint64 cursor = 1;  // Updated cursor for next iteration (0 when done)
  repeated string members = 2;  // List of set members matching the scan
}

// Script load operation
message LoadScriptRequest {
  string script = 1;
}

message LoadScriptResponse {
  bool success = 1;
  string sha = 2;  // SHA hash of the loaded script
}

// Script execution operation
message EvalShaRequest {
  string sha = 1;
  repeated string keys = 2;
  repeated string args = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message EvalShaResponse {
  bool success = 1;
  string result = 2;  // Script execution result
}

// Batch operations
message BatchOperation {
  enum OperationType {
    SET = 0;
    DELETE = 1;
    SETEX = 2;
    SETEXPIRY = 3;
    INCRBY = 4;
    DECRBY = 5;
    INCRBYFLOAT = 6;
    HSET = 7;
    HINCRBY = 8;
    HDECRBY = 9;
    HINCRBYFLOAT = 10;
    HMSET = 11;
    SETNX = 12;
    EVALSHA = 13;
    LOAD_SCRIPT = 14;
    HDEL = 15;
    SADD = 16;
    DEL_MULTIPLE = 17;
    HSETNX = 18;
    HEXPIRE = 19;
    HSET_BYTES = 20;
    SREM = 21;
    LPUSH = 22;
    RPUSH = 23;
    LPOP = 24;
    LTRIM = 25;
    XADD = 26;
    RPOP = 27;
    LSET = 28;
    LREM = 29;
    LINSERT = 30;
    LPUSHX = 31;
    RPUSHX = 32;
    ZADD = 33;
    ZREM = 34;
  }

  OperationType operation_type = 1;
  string key = 2;
  string value = 3;
  optional string field = 4;  // For hash operations
  optional int64 int_value = 5;  // For numeric operations
  optional double float_value = 6;  // For float operations
  optional uint64 ttl = 7;  // For expiry operations
  map<string, string> hash_fields = 8;  // For HMSET operations
  repeated string script_keys = 9;  // For EVALSHA operations
  repeated string script_args = 10;  // For EVALSHA operations
  optional string script_sha = 11;  // For EVALSHA operations
  repeated string fields = 12;  // For HDEL operations (hash fields to delete)
  repeated string members = 13;  // For SADD operations (set members to add)
  repeated string keys = 14;  // For DEL_MULTIPLE operations (keys to delete)
  optional bytes bytes_value = 15;  // For binary operations (HSET_BYTES)
  optional int64 seconds = 16;  // For HEXPIRE operation
  map<string, bytes> bytes_fields = 17;  // For binary hash operations
}

message BatchWriteRequest {
  repeated BatchOperation operations = 1;
  bool skip_replication = 2;
  bool skip_site_replication = 3;
}

message BatchWriteResponse {
  bool success = 1;
  repeated bool operation_results = 2;  // Results for each operation in the batch
}

// System operations
message PingRequest {
  // Empty request
}

message PingResponse {
  bool success = 1;
  string message = 2;
  int64 latency_ms = 3;  // Latency in milliseconds
}

// ---------------------------------------------------------------------------
// List (queue) operations
// ---------------------------------------------------------------------------

// LPUSH: prepend one or more values to a list
message LPushRequest {
  string key = 1;
  repeated string values = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message LPushResponse {
  int64 length = 1;  // Length of the list after the push
}

// RPUSH: append one or more values to a list
message RPushRequest {
  string key = 1;
  repeated string values = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message RPushResponse {
  int64 length = 1;  // Length of the list after the push
}

// LPOP: remove and return one or more values from the head of a list
message LPopRequest {
  string key = 1;
  optional uint32 count = 2;  // If unset, pop a single element
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message LPopResponse {
  repeated string values = 1;  // Empty if the list is empty / key missing
}

// LRANGE: read a slice of a list (no replication)
message LRangeRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
}

message LRangeResponse {
  repeated string values = 1;
}

// LLEN: list length (no replication)
message LLenRequest {
  string key = 1;
}

message LLenResponse {
  int64 length = 1;
}

// LTRIM: trim a list to the given range
message LTrimRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message LTrimResponse {
  bool success = 1;
}

// RPOP: remove and return one or more values from the tail of a list
message RPopRequest {
  string key = 1;
  optional uint32 count = 2;  // If unset, pop a single element
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message RPopResponse {
  repeated string values = 1;  // Empty if the list is empty / key missing
}

// LINDEX: read the element at the given index (no replication)
message LIndexRequest {
  string key = 1;
  int64 index = 2;
}

message LIndexResponse {
  bool found = 1;
  string value = 2;  // Empty if not found
}

// LSET: set the element at the given index. Errors if index is out of range.
message LSetRequest {
  string key = 1;
  int64 index = 2;
  string value = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message LSetResponse {
  bool success = 1;
}

// LREM: remove up to |count| elements equal to `element`.
//   count > 0  -> remove from head
//   count < 0  -> remove from tail
//   count == 0 -> remove all matches
message LRemRequest {
  string key = 1;
  int64 count = 2;
  string element = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message LRemResponse {
  int64 removed = 1;  // Number of elements removed
}

// LINSERT: insert `element` before or after the first occurrence of `pivot`.
message LInsertRequest {
  string key = 1;
  bool before = 2;        // true => BEFORE, false => AFTER
  string pivot = 3;
  string element = 4;
  bool skip_replication = 5;
  bool skip_site_replication = 6;
}

message LInsertResponse {
  int64 length = 1;  // New list length, -1 if pivot not found, 0 if key absent
}

// LPUSHX: prepend values only if the list exists.
message LPushXRequest {
  string key = 1;
  repeated string values = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message LPushXResponse {
  int64 length = 1;  // 0 if the list did not exist
}

// RPUSHX: append values only if the list exists.
message RPushXRequest {
  string key = 1;
  repeated string values = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message RPushXResponse {
  int64 length = 1;  // 0 if the list did not exist
}

// LPOS: find positions of `element` in the list (no replication).
message LPosRequest {
  string key = 1;
  string element = 2;
  optional int64 rank = 3;     // 1-based; negative searches from tail
  optional uint32 count = 4;   // If unset, returns at most one position
}

message LPosResponse {
  repeated int64 positions = 1;  // Empty if no match
}

// BLPOP: blocking left-pop from the first non-empty list among `keys`.
// timeout == 0.0 blocks indefinitely (subject to server-level deadline).
// Returns empty key + value on timeout.
message BLPopRequest {
  repeated string keys = 1;
  double timeout = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message BLPopResponse {
  string key = 1;    // which key was popped from; empty on timeout
  string value = 2;  // the popped value; empty on timeout
}

// BRPOP: blocking right-pop — identical structure.
message BRPopRequest {
  repeated string keys = 1;
  double timeout = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message BRPopResponse {
  string key = 1;
  string value = 2;
}

// ---------------------------------------------------------------------------
// Stream operations
// ---------------------------------------------------------------------------

// XADD: append an entry to a stream. If id == "*", the server resolves an ID
// and the resolved ID is what gets replicated to all replicas / peers / sites.
message XAddRequest {
  string key = 1;
  string id = 2;                       // "*" for auto-generated
  map<string, string> fields = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message XAddResponse {
  string id = 1;  // The resolved stream entry ID
}

// XREAD: read entries from one or more streams (non-blocking only in v1)
message XReadStreamKey {
  string key = 1;
  string id = 2;  // Last seen ID; use "0" to read from the start, "$" for newest only
}

message XReadEntry {
  string key = 1;
  string id = 2;
  map<string, string> fields = 3;
}

message XReadRequest {
  optional uint32 count = 1;
  repeated XReadStreamKey streams = 2;
}

message XReadResponse {
  repeated XReadEntry entries = 1;
}

// ---------------------------------------------------------------------------
// Sorted set operations
// ---------------------------------------------------------------------------

// ZADD: add a single member with score (RQ scheduler stores one entry per job).
message ZAddRequest {
  string key = 1;
  double score = 2;
  string member = 3;
  bool skip_replication = 4;
  bool skip_site_replication = 5;
}

message ZAddResponse {
  // 1 if a new element was added, 0 if an existing score was updated.
  int64 added = 1;
}

// ZREM: remove one or more members.
message ZRemRequest {
  string key = 1;
  repeated string members = 2;
  bool skip_replication = 3;
  bool skip_site_replication = 4;
}

message ZRemResponse {
  // Number of members removed (does not count non-existent members).
  int64 removed = 1;
}

// ZRANGEBYSCORE: read members whose scores fall in [min, max].
// Optional offset/count for LIMIT clause (used by the scheduler to batch
// "due" jobs). LIMIT applies only when `has_limit` is true.
message ZRangeByScoreRequest {
  string key = 1;
  double min = 2;
  double max = 3;
  bool has_limit = 4;
  int64 offset = 5;
  int64 count = 6;
  bool with_scores = 7;
}

message ZRangeByScoreMember {
  string member = 1;
  double score = 2;  // Only meaningful when the request had with_scores = true
}

message ZRangeByScoreResponse {
  repeated ZRangeByScoreMember members = 1;
}

// ZRANGE: index-based slice. Negative indices count from the tail.
message ZRangeRequest {
  string key = 1;
  int64 start = 2;
  int64 stop = 3;
  bool with_scores = 4;
}

message ZRangeMember {
  string member = 1;
  double score = 2;  // Only meaningful when the request had with_scores = true
}

message ZRangeResponse {
  repeated ZRangeMember members = 1;
}

// ZSCORE: read a single member's score.
message ZScoreRequest {
  string key = 1;
  string member = 2;
}

message ZScoreResponse {
  bool found = 1;
  double score = 2;
}

// ZCARD: cardinality of the sorted set.
message ZCardRequest {
  string key = 1;
}

message ZCardResponse {
  int64 cardinality = 1;
}